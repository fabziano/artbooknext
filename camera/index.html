<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Leitor QR Code Final</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body { 
            text-align: center; 
            font-family: sans-serif; 
            min-height: 100vh;
        }
        
        /* Container do Preview Quadrado (Aspect Ratio 1:1) */
        #video-container {
            width: 90%; 
            max-width: 400px;
            margin: 10px auto;
            position: relative;
            display: none; 
            border: 2px solid #000;
            
            /* Truque CSS para forçar aspect ratio 1:1 */
            padding-top: 90%; 
            height: 0;
            overflow: hidden;
        }
        
        #video-container video {
            position: absolute; /* Permite que o vídeo se posicione dentro do padding-top */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz o vídeo preencher o quadrado sem distorcer */
            display: block; 
        }
        
        #canvas { display: none; } 
        
        #controles {
            margin-top: 10px;
        }

        #btn-iniciar, #btn-desligar {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
        }
        
        #btn-desligar {
            background-color: #f44336;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.0.4/dist/jsQR.min.js"></script> 
</head>
<body>
    <h1>Leitor de QR Code</h1>
    
    <div id="controles">
        <button id="btn-iniciar" onclick="iniciarScanner()">Iniciar Leitura</button>
        <button id="btn-desligar" onclick="pararScannerManual()" style="display: none;">Desligar Câmera</button>
    </div>
    
    <div id="video-container">
        <video id="video" playsinline></video>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <p id="resultado">Código lido: N/A</p>

    <script>
        const video = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvas = canvasElement.getContext('2d');
        const resultadoElement = document.getElementById('resultado');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnDesligar = document.getElementById('btn-desligar');
        const videoContainer = document.getElementById('video-container');

        let animationFrameId = null;
        let isScanning = false;
        let videoTrack = null;

        function desenharBorda(localizacao, cor) {
            canvas.strokeStyle = cor;
            canvas.lineWidth = 4;
            canvas.beginPath();
            canvas.moveTo(localizacao.topLeftCorner.x, localizacao.topLeftCorner.y);
            canvas.lineTo(localizacao.topRightCorner.x, localizacao.topRightCorner.y);
            canvas.lineTo(localizacao.bottomRightCorner.x, localizacao.bottomRightCorner.y);
            canvas.lineTo(localizacao.bottomLeftCorner.x, localizacao.bottomLeftCorner.y);
            canvas.lineTo(localizacao.topLeftCorner.x, localizacao.topLeftCorner.y);
            canvas.stroke();
        }
        
        function toggleFlash(state) {
            if (!videoTrack) return;

            const capabilities = videoTrack.getCapabilities();

            if (!capabilities.torch) {
                console.warn('Controle de Flash (Torch) não suportado.');
                return;
            }

            videoTrack.applyConstraints({
                advanced: [{
                    torch: state 
                }]
            })
            .then(() => {
                console.log('Flash configurado para: ' + state);
            })
            .catch(err => {
                console.error('Erro ao controlar o Flash:', err);
            });
        }


        function tick() {
            if (!isScanning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    desenharBorda(code.location, "#FF0000"); 
                    resultadoElement.textContent = 'Código lido: ' + code.data;
                    pararScanner(code.data); // Desliga a câmera e reativa os botões
                    return; 
                }
            }
            animationFrameId = requestAnimationFrame(tick);
        }

        function iniciarScanner() {
            if (isScanning) return;
            
            btnIniciar.textContent = 'Aguardando Permissão...';
            btnIniciar.disabled = true;

            const constraints = {
                video: {
                    facingMode: "environment", 
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    videoTrack = stream.getVideoTracks()[0];
                    
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true);
                    
                    video.onloadedmetadata = function() {
                        video.play();
                        
                        toggleFlash(true); 
                        
                        videoContainer.style.display = 'block';
                        btnIniciar.style.display = 'none'; // Oculta o Iniciar
                        btnDesligar.style.display = 'inline-block'; // Mostra o Desligar
                        btnDesligar.disabled = false;
                        resultadoElement.textContent = 'Aponte a câmera traseira para um QR Code.';
                        
                        isScanning = true;
                        animationFrameId = requestAnimationFrame(tick);
                    };
                })
                .catch(function(err) {
                    btnIniciar.textContent = 'Iniciar Leitura';
                    btnIniciar.disabled = false;

                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        resultadoElement.textContent = 'ERRO: Acesso à câmera negado pelo usuário ou sistema.';
                    } else if (err.name === 'NotFoundError') {
                         resultadoElement.textContent = 'ERRO: Nenhuma câmera traseira encontrada no dispositivo.';
                    } else {
                        resultadoElement.textContent = 'ERRO: Falha ao iniciar câmera. Detalhe: ' + err.name;
                    }
                    console.error('Erro ao iniciar o scanner:', err);
                });
        }

        function pararScanner(codigoLido) {
            toggleFlash(false); 
            
            isScanning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            videoContainer.style.display = 'none';
            btnIniciar.style.display = 'inline-block'; // Mostra o Iniciar
            btnIniciar.textContent = 'Iniciar Nova Leitura'; // Atualiza o texto
            btnIniciar.disabled = false;
            btnDesligar.style.display = 'none'; // Oculta o Desligar
            
            console.log('QR Code Lido: ' + codigoLido);
            videoTrack = null;
        }
        
        function pararScannerManual() {
            pararScanner('Câmera Desligada Manualmente.');
            resultadoElement.textContent = 'Pronto para escanear.';
        }


        document.addEventListener('DOMContentLoaded', () => {
             btnIniciar.textContent = 'Iniciar Leitura';
             resultadoElement.textContent = 'Pronto para escanear.';
        });
    </script>
</body>
</html>
