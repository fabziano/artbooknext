<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Leitor QR Code Final</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body { 
            text-align: center; 
            font-family: sans-serif; 
            min-height: 100vh;
        }
        
        #icone-status {
            width: 150px; 
            height: 150px;
            margin: 20px auto;
        }

        #video-container {
            width: 90%; 
            max-width: 400px;
            margin: 10px auto;
            position: relative;
            display: none; 
            border: 2px solid #000;
            padding-top: 90%; 
            height: 0;
            overflow: hidden;
        }
        
        #video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block; 
        }
        
        #canvas { display: none; } 
        
        #controles {
            margin-top: 10px;
        }

        #btn-iniciar, #btn-desligar {
            padding: 10px 20px;
            font-size: 16px;
            margin: 5px;
        }
        
        #btn-desligar {
            background-color: #f44336;
            color: white;
            border: none;
            cursor: pointer;
        }
        
        #detalhes-carro {
            font-size: 0.9em;
            color: #666;
            margin-top: 10px;
            min-height: 50px;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.0.4/dist/jsQR.min.js"></script> 
</head>
<body>
    <h1>Leitor Estacionamento</h1>
    
    <div id="controles">
        <button id="btn-iniciar" onclick="iniciarScanner()" disabled>Aguardando Dados...</button>
        <button id="btn-desligar" onclick="pararScannerManual()" style="display: none;">Desligar Câmera</button>
    </div>
    
    <div id="video-container">
        <video id="video" playsinline></video>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div id="icone-status"></div>
    <p id="resultado">Carregando dados...</p>
    <p id="detalhes-carro"></p>

    <script>
        const video = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvas = canvasElement.getContext('2d');
        const resultadoElement = document.getElementById('resultado');
        const btnIniciar = document.getElementById('btn-iniciar');
        const btnDesligar = document.getElementById('btn-desligar');
        const videoContainer = document.getElementById('video-container');
        const iconeStatusDiv = document.getElementById('icone-status');
        const detalhesCarroP = document.getElementById('detalhes-carro');
        
        let STATUS_PAGAMENTO = {};
        let svgPago = '';
        let svgNaoPago = '';
        let svgNaoEncontrado = ''; // Variável para o novo SVG

        let animationFrameId = null;
        let isScanning = false;
        let videoTrack = null;
        
        // ====================================================================
        // FUNÇÃO DE CARREGAMENTO DE DADOS
        // ====================================================================

        async function carregarDados() {
            try {
                const response = await fetch('dados.json');
                if (!response.ok) {
                    throw new Error(`Erro HTTP! Status: ${response.status}`);
                }
                const data = await response.json();
                
                STATUS_PAGAMENTO = data.STATUS_PAGAMENTO;
                svgPago = data.SVGPAGO;
                svgNaoPago = data.SVGNOPAGO;
                svgNaoEncontrado = data.SVGNAOENCONTRADO; // Carrega o novo SVG
                
                btnIniciar.textContent = 'Iniciar Leitura';
                btnIniciar.disabled = false;
                resultadoElement.textContent = 'Pronto para escanear.';

            } catch (error) {
                console.error('Falha ao carregar dados.json:', error);
                resultadoElement.textContent = 'ERRO: Falha ao carregar dados do estacionamento.';
                resultadoElement.style.color = '#9f4c4c';
            }
        }

        // ====================================================================
        // LÓGICA DE NEGÓCIO E SCANNER
        // ====================================================================

        function verificarPagamento(codigoLido) {
            const status = STATUS_PAGAMENTO[codigoLido];
            
            detalhesCarroP.innerHTML = "";
            
            if (!status) { // Código não encontrado
                iconeStatusDiv.innerHTML = svgNaoEncontrado; // Usa o novo SVG
                resultadoElement.textContent = `Código '${codigoLido}' não encontrado na lista.`;
                resultadoElement.style.color = '#bf873e'; // Cor laranja/amarela para atenção
            } else if (status.pago) {
                iconeStatusDiv.innerHTML = svgPago;
                resultadoElement.textContent = `Acesso Liberado! (${status.nome})`;
                resultadoElement.style.color = '#699f4c';
                detalhesCarroP.innerHTML = `**Placa:** ${status.placa} | **Modelo:** ${status.modelo} | **Cor:** ${status.cor}`;
            } else { // Não pago
                iconeStatusDiv.innerHTML = svgNaoPago;
                resultadoElement.textContent = `PAGAMENTO PENDENTE! Acesso Negado. (${status.nome})`;
                resultadoElement.style.color = '#9f4c4c';
                detalhesCarroP.innerHTML = `**Placa:** ${status.placa} | **Modelo:** ${status.modelo} | **Cor:** ${status.cor}`;
            }
        }

        function desenharBorda(localizacao, cor) {
            canvas.strokeStyle = cor;
            canvas.lineWidth = 4;
            canvas.beginPath();
            canvas.moveTo(localizacao.topLeftCorner.x, localizacao.topLeftCorner.y);
            canvas.lineTo(localizacao.topRightCorner.x, localizacao.topRightCorner.y);
            canvas.lineTo(localizacao.bottomRightCorner.x, localizacao.bottomRightCorner.y);
            canvas.lineTo(localizacao.bottomLeftCorner.x, localizacao.bottomLeftCorner.y);
            canvas.lineTo(localizacao.topLeftCorner.x, localizacao.topLeftCorner.y);
            canvas.stroke();
        }
        
        function toggleFlash(state) {
            if (!videoTrack) return;
            const capabilities = videoTrack.getCapabilities();
            if (!capabilities.torch) {
                return;
            }
            videoTrack.applyConstraints({
                advanced: [{ torch: state }]
            }).catch(err => {
                console.error('Erro ao controlar o Flash:', err);
            });
        }

        function tick() {
            if (!isScanning) return;
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    desenharBorda(code.location, "#FF0000"); 
                    verificarPagamento(code.data);
                    pararScanner(code.data); 
                    return; 
                }
            }
            animationFrameId = requestAnimationFrame(tick);
        }

        function iniciarScanner() {
            if (isScanning || btnIniciar.disabled) return;
            
            iconeStatusDiv.innerHTML = "";
            detalhesCarroP.innerHTML = "";
            resultadoElement.textContent = 'Aguardando Permissão...';
            resultadoElement.style.color = '#333';
            btnIniciar.disabled = true;

            const constraints = {
                video: {
                    facingMode: "environment", 
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    videoTrack = stream.getVideoTracks()[0];
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true);
                    
                    video.onloadedmetadata = function() {
                        video.play();
                        
                        toggleFlash(true); 
                        
                        videoContainer.style.display = 'block';
                        btnIniciar.style.display = 'none';
                        btnDesligar.style.display = 'inline-block';
                        btnDesligar.disabled = false;
                        resultadoElement.textContent = 'Aponte a câmera traseira para o QR Code.';
                        
                        isScanning = true;
                        animationFrameId = requestAnimationFrame(tick);
                    };
                })
                .catch(function(err) {
                    btnIniciar.textContent = 'Iniciar Leitura';
                    btnIniciar.disabled = false;

                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        resultadoElement.textContent = 'ERRO: Acesso à câmera negado. (Permissão de sistema)';
                    } else {
                        resultadoElement.textContent = 'ERRO: Falha ao iniciar câmera. Detalhe: ' + err.name;
                    }
                    console.error('Erro ao iniciar o scanner:', err);
                });
        }

        function pararScanner(codigoLido) {
            toggleFlash(false); 
            
            isScanning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            videoContainer.style.display = 'none';
            btnIniciar.style.display = 'inline-block';
            btnIniciar.textContent = 'Iniciar Nova Leitura';
            btnIniciar.disabled = false;
            btnDesligar.style.display = 'none';
            
            console.log('Leitura finalizada. Código: ' + codigoLido);
            videoTrack = null;
        }
        
        function pararScannerManual() {
            pararScanner('Manual');
            resultadoElement.textContent = 'Pronto para escanear.';
            resultadoElement.style.color = '#333';
            iconeStatusDiv.innerHTML = ''; // Limpa o ícone
        }

        // Inicia o carregamento dos dados ao carregar a página
        document.addEventListener('DOMContentLoaded', carregarDados);
    </script>
</body>
</html>
