<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Leitor QR Code - GitHub Pages</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { text-align: center; font-family: sans-serif; }
        #video-container {
            width: 90%; 
            max-width: 400px;
            margin: 10px auto;
            position: relative;
            display: none; 
            border: 2px solid #000; 
        }
        #video-container video {
            width: 100%;
            height: auto;
            display: block; 
        }
        #canvas { display: none; } 
        #btn-iniciar {
            padding: 10px 20px;
            font-size: 16px;
            margin-bottom: 20px;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.0.4/dist/jsQR.min.js"></script> 
</head>
<body>
    <h1>Leitor de QR Code</h1>
    
    <button id="btn-iniciar" onclick="iniciarScanner()">Iniciar Leitura</button>
    
    <div id="video-container">
        <video id="video" playsinline></video>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <p id="resultado">Código lido: N/A</p>

    <script>
        const video = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvas = canvasElement.getContext('2d');
        const resultadoElement = document.getElementById('resultado');
        const btnIniciar = document.getElementById('btn-iniciar');
        const videoContainer = document.getElementById('video-container');

        let animationFrameId = null;
        let isScanning = false;

        function desenharBorda(localizacao, cor) {
            // ... (Função de desenho de borda)
            canvas.strokeStyle = cor;
            canvas.lineWidth = 4;
            canvas.beginPath();
            canvas.moveTo(localizacao.topLeftCorner.x, localizacao.topLeftCorner.y);
            canvas.lineTo(localizacao.topRightCorner.x, localizacao.topRightCorner.y);
            canvas.lineTo(localizacao.bottomRightCorner.x, localizacao.bottomRightCorner.y);
            canvas.lineTo(localizacao.bottomLeftCorner.x, localizacao.bottomLeftCorner.y);
            canvas.lineTo(localizacao.topLeftCorner.x, localizacao.topLeftCorner.y);
            canvas.stroke();
        }

        function tick() {
            if (!isScanning) return; // Garante que o loop só roda se estiver escaneando

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // Ajusta o tamanho do canvas para o tamanho do vídeo
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                
                // Desenha o frame atual do vídeo no canvas
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    desenharBorda(code.location, "#FF0000"); 
                    resultadoElement.textContent = 'Código lido: ' + code.data;
                    pararScanner(code.data); 
                    return; 
                }
            }
            animationFrameId = requestAnimationFrame(tick);
        }

        function iniciarScanner() {
            if (isScanning) return;
            
            // Desativa o botão IMEDIATAMENTE após o clique
            btnIniciar.textContent = 'Aguardando Permissão...';
            btnIniciar.disabled = true;

            // Restrições: Câmera traseira com resolução preferencial
            const constraints = {
                video: {
                    facingMode: "environment", 
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            };
            
            // O request da câmera é o que dispara a caixa de diálogo de permissão
            navigator.mediaDevices.getUserMedia(constraints)
                .then(function(stream) {
                    video.srcObject = stream;
                    video.setAttribute("playsinline", true);
                    
                    video.onloadedmetadata = function() {
                        video.play();
                        
                        videoContainer.style.display = 'block';
                        btnIniciar.textContent = 'Aguardando QR Code...';
                        resultadoElement.textContent = 'Aponte a câmera traseira para um QR Code.';
                        
                        isScanning = true;
                        animationFrameId = requestAnimationFrame(tick);
                    };
                })
                .catch(function(err) {
                    // Trata os erros e reativa o botão para uma nova tentativa
                    btnIniciar.textContent = 'Iniciar Leitura';
                    btnIniciar.disabled = false;

                    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        resultadoElement.textContent = 'ERRO: Acesso à câmera negado pelo usuário ou sistema.';
                    } else if (err.name === 'NotFoundError') {
                         resultadoElement.textContent = 'ERRO: Nenhuma câmera traseira encontrada no dispositivo.';
                    } else {
                        resultadoElement.textContent = 'ERRO: Falha ao iniciar câmera. Detalhe: ' + err.name;
                    }
                    console.error('Erro ao iniciar o scanner:', err);
                });
        }

        function pararScanner(codigoLido) {
            isScanning = false;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
            }
            
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
            }

            videoContainer.style.display = 'none';
            btnIniciar.textContent = 'Iniciar Nova Leitura';
            btnIniciar.disabled = false;
            
            alert('Código Lido: ' + codigoLido);
        }

        // Garante que o estado inicial é limpo
        document.addEventListener('DOMContentLoaded', () => {
             btnIniciar.textContent = 'Iniciar Leitura';
             resultadoElement.textContent = 'Pronto para escanear.';
        });
    </script>
</body>
</html>
