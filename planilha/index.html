<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Enxoval Interativa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-active {
            background-color: #3b82f6;
            color: white;
        }

        .sub-tab-active {
            background-color: #fb923c;
            color: white;
        }

        #loader {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="p-4 bg-gray-50">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-3xl font-bold text-center mb-6 text-blue-600">Lista de Enxoval</h1>

        <div class="flex flex-wrap mb-6 space-x-2 md:space-x-4">
            <button id="cozinha-tab" class="tab px-4 py-2 bg-gray-200 rounded-t-lg hover:bg-gray-300 focus:outline-none"
                onclick="showTab('cozinha')">Cozinha</button>
            <button id="banheiro-tab"
                class="tab px-4 py-2 bg-gray-200 rounded-t-lg hover:bg-gray-300 focus:outline-none"
                onclick="showTab('banheiro')">Banheiro</button>
            <button id="quarto-tab" class="tab px-4 py-2 bg-gray-200 rounded-t-lg hover:bg-gray-300 focus:outline-none"
                onclick="showTab('quarto')">Quarto</button>
            <button id="sala-tab" class="tab px-4 py-2 bg-gray-200 rounded-t-lg hover:bg-gray-300 focus:outline-none"
                onclick="showTab('sala')">Sala</button>
            <button id="varanda-tab" class="tab px-4 py-2 bg-gray-200 rounded-t-lg hover:bg-gray-300 focus:outline-none"
                onclick="showTab('varanda')">Varanda</button>
        </div>

        <div id="sub-tabs" class="flex flex-wrap mb-4 space-x-2 md:space-x-4">
            <button id="pendente-sub-tab"
                class="sub-tab px-3 py-1 bg-orange-100 rounded hover:bg-orange-200 focus:outline-none"
                onclick="showSubTab('pendente')">A Comprar</button>
            <button id="comprado-sub-tab"
                class="sub-tab px-3 py-1 bg-orange-100 rounded hover:bg-orange-200 focus:outline-none"
                onclick="showSubTab('comprado')">Comprados</button>
        </div>

        <div id="tab-content">
            <div id="add-item-section" class="bg-blue-50 p-4 rounded-lg mb-4">
                <h2 class="text-xl font-semibold mb-3">Adicionar Item em <span id="current-room"></span> (A Comprar)
                </h2>
                <form id="add-item-form" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <input type="text" id="item-name" placeholder="Nome do Item"
                        class="border border-gray-300 p-2 rounded" required>
                    <input type="number" id="item-qty" placeholder="Quantidade" min="1"
                        class="border border-gray-300 p-2 rounded" required>
                    <input type="number" id="item-price" placeholder="Valor (R$)" step="0.01" min="0"
                        class="border border-gray-300 p-2 rounded" required>
                    <button type="submit"
                        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600 col-span-1 md:col-span-3">Adicionar
                        Item</button>
                </form>
            </div>

            <div id="loader" style="display: none;"></div>

            <div class="item-list">
                <h2 class="text-xl font-semibold mb-3"><span id="current-subtitle"></span></h2>
                <ul id="item-list" class="space-y-2"></ul>
                <p id="empty-message" class="text-gray-500 mt-4">Nenhum item nesta categoria ainda.</p>
            </div>
        </div>

        <div class="mt-6 text-center">
            <div class="inline-block p-4 bg-gray-100 rounded-lg">
                <img src="https://storage.googleapis.com/workspace-0f70711f-8b4e-4d94-86f1-2a93ccde5887/image/acfeb474-e6a0-4dfd-8832-a3cd742e9aec.png"
                    alt="Visualização de itens por cômodo" class="w-full max-w-md mx-auto rounded">
                <p class="text-sm text-gray-600 mt-2">Visualização organizada para planejamento do enxoval.</p>
            </div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxMzC4xhQGEGMR0V1lptOvuDeT_3DnneHXTkj0GaSlVyxpkUjLupu50qcYK4wWZit6bsw/exec';

        let enxovalData = {};
        let currentRoom = 'cozinha';
        let currentSubTab = 'pendente';
        let isLoading = false;

        const loader = document.getElementById('loader');

        document.addEventListener('DOMContentLoaded', async function () {
            document.getElementById('add-item-form').addEventListener('submit', function (e) {
                e.preventDefault();
                addItem();
            });
            await loadItems();
            showTab(currentRoom);
        });

        function setLoading(state) {
            isLoading = state;
            loader.style.display = state ? 'block' : 'none';
        }

        async function loadItems() {
            setLoading(true);
            try {
                const response = await fetch(SCRIPT_URL);
                if (!response.ok) throw new Error('Falha ao carregar dados da planilha.');
                enxovalData = await response.json();
            } catch (error) {
                console.error('Erro:', error);
                alert('Não foi possível carregar os itens. Verifique o console para mais detalhes.');
                enxovalData = { cozinha: { pendente: [], comprado: [] }, banheiro: { pendente: [], comprado: [] }, quarto: { pendente: [], comprado: [] }, sala: { pendente: [], comprado: [] }, varanda: { pendente: [], comprado: [] } };
            } finally {
                setLoading(false);
            }
        }

async function saveItems() {
    if (isLoading) return;
    setLoading(true);
    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            cache: 'no-cache',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(enxovalData)
        });
    } catch (error) {
        console.error('Erro ao salvar:', error);
        alert('Não foi possível salvar os itens na planilha.');
    } finally {
        setLoading(false);
    }
}

        function showTab(room) {
            currentRoom = room;
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('tab-active'));
            document.getElementById(room + '-tab').classList.add('tab-active');
            document.getElementById('current-room').textContent = room.charAt(0).toUpperCase() + room.slice(1);
            showSubTab(currentSubTab);
        }

        function showSubTab(subTab) {
            currentSubTab = subTab;
            document.querySelectorAll('.sub-tab').forEach(stab => stab.classList.remove('sub-tab-active'));
            document.getElementById(subTab + '-sub-tab').classList.add('sub-tab-active');

            const subtitle = subTab === 'pendente' ? 'Itens A Comprar' : 'Itens Comprados';
            document.getElementById('current-subtitle').textContent = subtitle;
            document.getElementById('add-item-section').style.display = subTab === 'pendente' ? 'block' : 'none';

            displayItems();
        }

        async function addItem() {
            const name = document.getElementById('item-name').value.trim();
            const qty = parseInt(document.getElementById('item-qty').value);
            const price = parseFloat(document.getElementById('item-price').value);

            if (name && qty > 0 && !isNaN(price)) {
                enxovalData[currentRoom].pendente.push({ name, qty, price, id: Date.now() });
                displayItems();
                await saveItems();
                document.getElementById('add-item-form').reset();
            } else {
                alert('Por favor, preencha todos os campos corretamente.');
            }
        }

        async function moveItem(room, id, fromSub, toSub) {
            const itemIndex = enxovalData[room][fromSub].findIndex(i => i.id === id);
            if (itemIndex !== -1) {
                const [item] = enxovalData[room][fromSub].splice(itemIndex, 1);
                enxovalData[room][toSub].push(item);
                displayItems();
                await saveItems();
            }
        }

        async function editItem(room, subTab, id) {
            const item = enxovalData[room][subTab].find(i => i.id === id);
            if (item) {
                const newName = prompt('Novo nome:', item.name);
                const newQty = parseInt(prompt('Nova quantidade:', item.qty), 10);
                const newPrice = parseFloat(prompt('Novo valor:', item.price));

                if (newName && newQty > 0 && !isNaN(newPrice)) {
                    item.name = newName.trim();
                    item.qty = newQty;
                    item.price = newPrice;
                    displayItems();
                    await saveItems();
                }
            }
        }

        async function deleteItem(room, subTab, id) {
            enxovalData[room][subTab] = enxovalData[room][subTab].filter(i => i.id !== id);
            displayItems();
            await saveItems();
        }

        function displayItems() {
            const list = document.getElementById('item-list');
            const emptyMessage = document.getElementById('empty-message');
            list.innerHTML = '';

            const items = enxovalData[currentRoom]?.[currentSubTab] || [];

            if (items.length === 0) {
                emptyMessage.style.display = 'block';
                return;
            }
            emptyMessage.style.display = 'none';

            items.forEach(item => {
                const listItem = document.createElement('li');
                listItem.className = 'flex flex-col md:flex-row justify-between items-start md:items-center bg-gray-50 p-4 rounded border';

                let actionButtons = '';
                if (currentSubTab === 'pendente') {
                    actionButtons = `
                        <button onclick="moveItem('${currentRoom}', ${item.id}, 'pendente', 'comprado')" class="bg-green-500 text-white px-3 py-1 rounded hover:bg-green-600">Comprado</button>
                        <button onclick="editItem('${currentRoom}', 'pendente', ${item.id})" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">Editar</button>
                        <button onclick="deleteItem('${currentRoom}', 'pendente', ${item.id})" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Excluir</button>
                    `;
                } else {
                    actionButtons = `
                        <button onclick="moveItem('${currentRoom}', ${item.id}, 'comprado', 'pendente')" class="bg-blue-500 text-white px-3 py-1 rounded hover:bg-blue-600">Mover para Pendente</button>
                        <button onclick="editItem('${currentRoom}', 'comprado', ${item.id})" class="bg-yellow-500 text-white px-3 py-1 rounded hover:bg-yellow-600">Editar</button>
                        <button onclick="deleteItem('${currentRoom}', 'comprado', ${item.id})" class="bg-red-500 text-white px-3 py-1 rounded hover:bg-red-600">Excluir</button>
                    `;
                }

                listItem.innerHTML = `
                    <div class="flex-1">
                        <strong>${item.name}</strong> - Qtd: ${item.qty} - Valor: R$ ${item.price.toFixed(2)}
                    </div>
                    <div class="flex space-x-2 mt-2 md:mt-0 flex-wrap">
                        ${actionButtons}
                    </div>
                `;
                list.appendChild(listItem);
            });
        }
    </script>
</body>

</html>
